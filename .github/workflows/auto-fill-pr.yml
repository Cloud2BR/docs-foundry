name: Auto-fill PR Description

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  models: read

jobs:
  fill-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gather context
        id: ctx
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # ── Commits ──
          COMMITS=$(git log --pretty=format:"- %s" "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || echo "- (unable to read commits)")
          echo "commits<<EOF_COMMITS" >> "$GITHUB_OUTPUT"
          echo "$COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF_COMMITS" >> "$GITHUB_OUTPUT"

          # ── Diff stat ──
          DIFFSTAT=$(git diff --stat "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null | tail -1 || echo "")
          echo "diffstat=${DIFFSTAT}" >> "$GITHUB_OUTPUT"

          # ── Changed files grouped by directory ──
          FILES=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || echo "")
          FILE_SUMMARY=""
          if [ -n "$FILES" ]; then
            DIRS=$(echo "$FILES" | sed 's|/.*||' | sort | uniq -c | sort -rn)
            while IFS= read -r line; do
              COUNT=$(echo "$line" | awk '{print $1}')
              DIR=$(echo "$line" | awk '{print $2}')
              [ -n "$DIR" ] && FILE_SUMMARY="${FILE_SUMMARY}- \`${DIR}/\`: ${COUNT} file(s)"$'\n'
            done <<< "$DIRS"
            TOTAL=$(echo "$FILES" | wc -l | tr -d ' ')
            FILE_SUMMARY="${FILE_SUMMARY}- **Total:** ${TOTAL} file(s)"
          fi
          echo "files<<EOF_FILES" >> "$GITHUB_OUTPUT"
          echo "$FILE_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF_FILES" >> "$GITHUB_OUTPUT"

          # ── Linked issues ──
          ISSUES=$(git log --pretty=format:"%s %b" "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null \
            | grep -oE '(close[sd]?|fix(es|ed)?|resolve[sd]?) #[0-9]+' \
            | grep -oE '#[0-9]+' | sort -u | tr '\n' ' ' || true)
          echo "issues=${ISSUES:-none}" >> "$GITHUB_OUTPUT"

          # ── Compact diff for AI (truncated to 12000 chars to fit context) ──
          DIFF=$(git diff "${BASE_SHA}..${HEAD_SHA}" -- . ':!package-lock.json' ':!*.svg' 2>/dev/null | head -c 12000 || echo "")
          echo "diff<<EOF_DIFF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF_DIFF" >> "$GITHUB_OUTPUT"

      - name: Generate AI summary
        id: ai
        uses: actions/github-script@v7
        env:
          COMMITS: ${{ steps.ctx.outputs.commits }}
          FILES: ${{ steps.ctx.outputs.files }}
          DIFFSTAT: ${{ steps.ctx.outputs.diffstat }}
          ISSUES: ${{ steps.ctx.outputs.issues }}
          DIFF: ${{ steps.ctx.outputs.diff }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          COMMIT_COUNT: ${{ github.event.pull_request.commits }}
        with:
          script: |
            const prompt = `You are a PR description agent for the DocFoundry project (an Electron desktop documentation editor).
            Analyze the following git diff and commit messages, then produce a PR description using EXACTLY this template.
            Be concise and specific. Focus on WHAT changed and WHY.

            Branch: ${process.env.HEAD_REF} → ${process.env.BASE_REF} (${process.env.COMMIT_COUNT} commits)
            Linked issues: ${process.env.ISSUES}

            Commits:
            ${process.env.COMMITS}

            Diff stat: ${process.env.DIFFSTAT}

            Files touched:
            ${process.env.FILES}

            Diff (truncated):
            \`\`\`
            ${process.env.DIFF}
            \`\`\`

            Fill in this template — replace placeholder text, keep markdown formatting:

            ## Summary

            <one paragraph describing what this PR does and why>

            ## Changes

            <bulleted list of specific changes, grouped logically>

            ## Validation

            - [ ] I tested my change (describe how)
            - [ ] I updated documentation/templates if needed
            - [ ] I confirmed no secrets or sensitive data are included

            ## Notes

            <any context reviewers should know, or "No additional notes.">`;

            let body = '';
            try {
              const response = await fetch('https://models.github.ai/inference/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                  model: 'openai/gpt-4o-mini',
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 1200,
                  temperature: 0.3,
                }),
              });

              if (response.ok) {
                const data = await response.json();
                body = data.choices?.[0]?.message?.content || '';
              }

              if (!body) throw new Error('Empty AI response');
              core.info('AI summary generated successfully');
            } catch (err) {
              core.warning(`AI summary failed (${err.message}), using structured fallback`);
              const issues = process.env.ISSUES === 'none' ? '' : `\nLinked issues: ${process.env.ISSUES}`;
              body = `## Summary\n\nAuto-generated from \`${process.env.HEAD_REF}\` → \`${process.env.BASE_REF}\` (${process.env.COMMIT_COUNT} commits).${issues}\n\n## Changes\n\n**Commits:**\n${process.env.COMMITS}\n\n**Files touched:**\n${process.env.FILES}\n\n## Validation\n\n- [ ] I tested my change (describe how)\n- [ ] I updated documentation/templates if needed\n- [ ] I confirmed no secrets or sensitive data are included\n\n## Notes\n\n_This description was auto-generated. Edit freely to add context._`;
            }

            core.setOutput('body', body);

      - name: Update PR description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "${{ steps.ai.outputs.body }}"
