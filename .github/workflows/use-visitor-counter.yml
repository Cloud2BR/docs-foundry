name: Update Visitor Badge

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump visitor counter
        env:
          NAMESPACE: brown9804
          KEY: docfoundry-readme
        run: |
          curl -fsSL "https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}" > counter.json

      - name: Update badge markers in README and Pages site
        run: |
          python - <<'PY'
          from pathlib import Path

          value = Path("counter.json").read_text(encoding="utf-8")
          import json
          count = json.loads(value)["value"]

          START = "<!-- START BADGE -->"
          END   = "<!-- END BADGE -->"

          # README badge (div block, centered)
          readme = Path("README.md")
          readme_badge = f'<div align="center">\n  <img src="https://img.shields.io/badge/Total%20views-{count}-limegreen" alt="Total views">\n</div>'
          t = readme.read_text(encoding="utf-8")
          if START not in t or END not in t:
              raise SystemExit("README badge markers are missing")
          before, rest = t.split(START, 1)
          _, after = rest.split(END, 1)
          readme.write_text(before + START + "\n" + readme_badge + "\n" + END + after, encoding="utf-8")

          # Pages site badge (inline img inside the hero-bar span)
          pages = Path("docs/index.html")
          pages_badge = f'<span class="badge-link"><img src="https://img.shields.io/badge/Total%20views-{count}-limegreen" alt="Total views" loading="lazy" /></span>'
          t = pages.read_text(encoding="utf-8")
          if START not in t or END not in t:
              raise SystemExit("docs/index.html badge markers are missing")
          before, rest = t.split(START, 1)
          _, after = rest.split(END, 1)
          pages.write_text(before + START + "\n          " + pages_badge + "\n          " + END + after, encoding="utf-8")
          PY

      - name: Commit badge changes
        run: |
          if git diff --quiet; then
            echo "No badge change required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/index.html
          git commit -m "docs: update visitor badge"
          git push
